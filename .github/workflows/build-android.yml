name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Install dependencies
        run: pnpm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Delete Cargo.lock to force fresh resolution
        run: rm -f src-tauri/Cargo.lock

      - name: Skip TypeScript check in build script
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (pkg.scripts && pkg.scripts.build) {
              pkg.scripts.build = pkg.scripts.build.replace('tsc -b && ', '');
              console.log('New build script:', pkg.scripts.build);
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Init Android
        run: |
          rm -rf src-tauri/gen/android
          cargo tauri android init

      - name: Add storage permissions to AndroidManifest
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          echo "Current manifest:"
          cat $MANIFEST
          sed -i 's/<manifest/<manifest/g' $MANIFEST
          sed -i 's/<application/<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"\/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"\/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"\/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"\/>\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"\/>\n    <application/g' $MANIFEST
          echo "Updated manifest:"
          cat $MANIFEST

      - name: Build APK
        run: cargo tauri android build --apk --target armv7
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias debug \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,S=Debug,C=US"

      - name: Sign APK with debug key
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" | head -1)
          echo "Found APK: $APK"
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -r | head -1)
          echo "Using apksigner: $APKSIGNER"
          $APKSIGNER sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias debug \
            --out AltSendme-signed.apk \
            "$APK"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: AltSendme-android-signed
          path: AltSendme-signed.apk
          if-no-files-found: warn
